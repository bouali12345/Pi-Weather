<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pi Weather</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky0:#0a0f2e;--sky1:#0d1f4a;--sky2:#1a3a6b;
  --gold:#f5a623;--gold2:#ffc85e;--gold-glow:rgba(245,166,35,.25);
  --white:#ffffff;--dim:#a8bbd4;--card:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.1);--radius:20px;
}
html{scroll-behavior:smooth}
body{
  background:linear-gradient(160deg,var(--sky0) 0%,var(--sky1) 50%,var(--sky2) 100%);
  min-height:100vh;color:var(--white);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
}
body[dir="rtl"]{font-family:'Cairo',sans-serif}

/* Stars background */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* Layout */
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px 16px 40px}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#e8850a);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#000;box-shadow:0 0 20px var(--gold-glow)}
.logo-text{font-family:'DM Serif Display',serif;font-size:20px;color:var(--white)}
.logo-text span{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:8px}

/* Lang switcher */
.lang-sw{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3px}
.lang-btn{padding:5px 9px;border-radius:9px;border:none;background:transparent;color:var(--dim);font-size:11px;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .2s;font-family:inherit}
.lang-btn.active{background:var(--gold);color:#000}

/* Pi user chip */
.pi-chip{display:none;align-items:center;gap:6px;padding:5px 10px 5px 5px;border-radius:100px;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3)}
.pi-chip.show{display:flex}
.pi-avatar{width:24px;height:24px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-size:11px;font-weight:800}
.pi-name{font-size:12px;font-weight:600;color:var(--gold)}

/* Auth gate */
.auth-gate{text-align:center;padding:60px 20px;animation:fadeUp .5s ease}
.auth-gate .big-icon{font-size:64px;margin-bottom:20px;filter:drop-shadow(0 0 20px var(--gold-glow))}
.auth-gate h2{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:10px}
.auth-gate p{color:var(--dim);font-size:14px;line-height:1.7;margin-bottom:28px}
.btn-signin{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#e8850a);border:none;color:#000;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 8px 28px var(--gold-glow);font-family:inherit}
.btn-signin:hover{transform:translateY(-2px);box-shadow:0 12px 36px var(--gold-glow)}
.btn-signin:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-status{margin-top:14px;font-size:13px;color:var(--dim);min-height:18px}
.auth-err{color:#f87171}

/* Main weather UI */
.weather-ui{display:none;animation:fadeUp .5s ease}
.weather-ui.show{display:block}

/* Search bar */
.search-wrap{position:relative;margin-bottom:24px}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 44px 12px 16px;color:var(--white);font-size:14px;outline:none;transition:all .2s;font-family:inherit;backdrop-filter:blur(10px)}
[dir="rtl"] .search-input{padding:12px 16px 12px 44px}
.search-input::placeholder{color:var(--dim)}
.search-input:focus{border-color:rgba(245,166,35,.5);background:rgba(255,255,255,.09)}
.search-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gold);cursor:pointer;font-size:18px;padding:4px;line-height:1}
[dir="rtl"] .search-btn{right:auto;left:12px}

/* Main card */
.main-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:28px 24px;margin-bottom:16px;backdrop-filter:blur(20px);position:relative;overflow:hidden;animation:cardIn .6s ease}
.main-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);pointer-events:none}
[dir="rtl"] .main-card::before{right:auto;left:-40px}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.city-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.city-name{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400}
.country-code{font-size:12px;color:var(--dim);margin-top:2px}
.weather-icon-big{font-size:72px;line-height:1;filter:drop-shadow(0 0 20px rgba(255,255,255,.2));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.temp-row{display:flex;align-items:flex-end;gap:8px;margin:8px 0 4px}
.temp-big{font-family:'DM Serif Display',serif;font-size:72px;line-height:1;font-weight:400}
.temp-unit{font-size:28px;color:var(--dim);margin-bottom:12px}
.feels-like{font-size:13px;color:var(--dim);margin-bottom:12px}
.weather-desc{font-size:15px;font-weight:500;color:var(--gold2);text-transform:capitalize}

/* Details grid */
.details-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px}
.detail-item{background:rgba(255,255,255,.05);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px}
.detail-icon{font-size:22px;flex-shrink:0}
.detail-label{font-size:11px;color:var(--dim)}
.detail-val{font-size:15px;font-weight:600;margin-top:1px}

/* Hourly forecast */
.section-title{font-size:13px;font-weight:600;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.hourly-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hourly-scroll::-webkit-scrollbar{display:none}
.hour-card{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 14px;text-align:center;backdrop-filter:blur(10px);transition:all .2s;min-width:64px}
.hour-card:hover{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.08)}
.hour-time{font-size:11px;color:var(--dim);margin-bottom:6px}
.hour-icon{font-size:24px;margin-bottom:6px}
.hour-temp{font-size:14px;font-weight:600}

/* Daily forecast */
.daily-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.day-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;backdrop-filter:blur(10px)}
.day-name{font-size:13px;font-weight:500;width:60px}
.day-icon{font-size:22px}
.day-temps{display:flex;gap:8px;align-items:center}
.day-max{font-size:14px;font-weight:600}
.day-min{font-size:14px;color:var(--dim)}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--dim);font-size:14px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.error-msg{text-align:center;padding:32px;color:#f87171;font-size:14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:16px;margin-bottom:16px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Report button */
.btn-report{width:100%;padding:13px;border-radius:14px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-report:hover{background:rgba(245,166,35,.2)}

/* Notif */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;background:linear-gradient(135deg,#059669,#10b981);color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px;white-space:nowrap;animation:slideDown .3s ease}
.notif.hide{animation:slideUp .3s ease forwards}
.notif.hidden{display:none}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes slideUp{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-20px)}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="notif hidden" id="notif"></div>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">π</div>
      <div class="logo-text">Pi<span>Weather</span></div>
    </div>
    <div class="topbar-right">
      <div class="lang-sw">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ar">AR</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>
      <div class="pi-chip" id="pi-chip">
        <div class="pi-avatar" id="pi-avatar">π</div>
        <span class="pi-name" id="pi-name"></span>
      </div>
    </div>
  </div>

  <!-- AUTH GATE -->
  <div class="auth-gate" id="auth-gate">
    <div class="big-icon">🌤️</div>
    <h2 id="auth-title">Pi Weather</h2>
    <p id="auth-sub">Sign in with your Pi Network account to get real-time weather for any city in the world.</p>
    <button class="btn-signin" id="signin-btn" onclick="triggerPiAuth()">
      <span>π</span> <span id="signin-lbl">Sign in with Pi</span>
    </button>
    <div class="auth-status" id="auth-status"></div>
  </div>

  <!-- WEATHER UI -->
  <div class="weather-ui" id="weather-ui">

    <!-- Search -->
    <div class="search-wrap">
      <input class="search-input" id="search-input" placeholder="Search city..." onkeydown="if(event.key==='Enter')searchCity()"/>
      <button class="search-btn" onclick="searchCity()">🔍</button>
    </div>

    <!-- Content area -->
    <div id="weather-content">
      <div class="loading"><div class="spinner"></div><div id="loading-txt">Detecting your location...</div></div>
    </div>

  </div>

</div>

<script>
// ─── Translations ─────────────────────────────────────────────────────────────
const T = {
  en: {
    dir:'ltr',
    authTitle:'Pi Weather',
    authSub:'Sign in with your Pi Network account to get real-time weather for any city in the world.',
    signinLbl:'Sign in with Pi',
    signinLoading:'Connecting to Pi Network...',
    signinErr:'Sign-in failed. Please try again.',
    searchPh:'Search city...',
    loadingLoc:'Detecting your location...',
    loadingCity:'Loading weather...',
    feelsLike:'Feels like',
    humidity:'Humidity',
    wind:'Wind',
    visibility:'Visibility',
    uvIndex:'UV Index',
    pressure:'Pressure',
    hourly:'Hourly Forecast',
    daily:'7-Day Forecast',
    reportBtn:'📍 Report Local Weather',
    reportThanks:'Thanks for your report! +0.01π earned 🎉',
    days:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    notFound:'City not found. Try another name.',
    welcome:'Welcome',
    kmh:'km/h', km:'km', hPa:'hPa',
  },
  ar: {
    dir:'rtl',
    authTitle:'طقس Pi',
    authSub:'سجّل دخولك بحساب Pi Network للحصول على الطقس الفوري لأي مدينة في العالم.',
    signinLbl:'تسجيل الدخول بـ Pi',
    signinLoading:'جارٍ الاتصال بـ Pi Network...',
    signinErr:'فشل تسجيل الدخول. حاول مرة أخرى.',
    searchPh:'ابحث عن مدينة...',
    loadingLoc:'جارٍ تحديد موقعك...',
    loadingCity:'جارٍ تحميل الطقس...',
    feelsLike:'يبدو كأنه',
    humidity:'الرطوبة',
    wind:'الرياح',
    visibility:'الرؤية',
    uvIndex:'مؤشر UV',
    pressure:'الضغط',
    hourly:'التوقعات بالساعة',
    daily:'توقعات 7 أيام',
    reportBtn:'📍 أرسل تقرير الطقس المحلي',
    reportThanks:'شكراً على تقريرك! ربحت 0.01π 🎉',
    days:['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'],
    notFound:'المدينة غير موجودة. جرّب اسماً آخر.',
    welcome:'مرحباً',
    kmh:'كم/س', km:'كم', hPa:'هيكتوباسكال',
  },
  fr: {
    dir:'ltr',
    authTitle:'Pi Météo',
    authSub:'Connectez-vous avec votre compte Pi Network pour obtenir la météo en temps réel pour n\'importe quelle ville.',
    signinLbl:'Se connecter avec Pi',
    signinLoading:'Connexion à Pi Network...',
    signinErr:'Échec de connexion. Réessayez.',
    searchPh:'Rechercher une ville...',
    loadingLoc:'Détection de votre position...',
    loadingCity:'Chargement de la météo...',
    feelsLike:'Ressenti',
    humidity:'Humidité',
    wind:'Vent',
    visibility:'Visibilité',
    uvIndex:'Indice UV',
    pressure:'Pression',
    hourly:'Prévisions horaires',
    daily:'Prévisions 7 jours',
    reportBtn:'📍 Signaler la météo locale',
    reportThanks:'Merci pour votre rapport! +0.01π gagné 🎉',
    days:['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],
    notFound:'Ville introuvable. Essayez un autre nom.',
    welcome:'Bienvenue',
    kmh:'km/h', km:'km', hPa:'hPa',
  },
  es: {
    dir:'ltr',
    authTitle:'Pi Clima',
    authSub:'Inicia sesión con tu cuenta Pi Network para obtener el clima en tiempo real de cualquier ciudad.',
    signinLbl:'Iniciar sesión con Pi',
    signinLoading:'Conectando a Pi Network...',
    signinErr:'Error al iniciar sesión. Inténtalo de nuevo.',
    searchPh:'Buscar ciudad...',
    loadingLoc:'Detectando tu ubicación...',
    loadingCity:'Cargando el clima...',
    feelsLike:'Sensación',
    humidity:'Humedad',
    wind:'Viento',
    visibility:'Visibilidad',
    uvIndex:'Índice UV',
    pressure:'Presión',
    hourly:'Pronóstico por hora',
    daily:'Pronóstico 7 días',
    reportBtn:'📍 Reportar clima local',
    reportThanks:'¡Gracias por tu reporte! +0.01π ganado 🎉',
    days:['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],
    notFound:'Ciudad no encontrada. Prueba otro nombre.',
    welcome:'Bienvenido',
    kmh:'km/h', km:'km', hPa:'hPa',
  }
};

// ─── State ────────────────────────────────────────────────────────────────────
let lang = 'en';
let piUser = null;
let currentWeather = null;

// ─── Stars ────────────────────────────────────────────────────────────────────
(function buildStars(){
  const c = document.getElementById('stars');
  let h = '';
  for(let i=0;i<80;i++){
    const x=Math.random()*100, y=Math.random()*100;
    const s=Math.random()*2+.5;
    const d=2+Math.random()*4, delay=Math.random()*5;
    h+=`<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;--d:${d}s;--delay:${delay}s"></div>`;
  }
  c.innerHTML=h;
})();

// ─── Language ─────────────────────────────────────────────────────────────────
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  const t=T[l];
  document.documentElement.setAttribute('lang',l);
  document.documentElement.setAttribute('dir',t.dir);
  document.body.setAttribute('dir',t.dir);
  document.getElementById('auth-title').textContent=t.authTitle;
  document.getElementById('auth-sub').textContent=t.authSub;
  document.getElementById('signin-lbl').textContent=t.signinLbl;
  const si=document.getElementById('search-input');
  if(si) si.placeholder=t.searchPh;
  if(currentWeather) renderWeather(currentWeather);
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

// ─── Pi Auth ──────────────────────────────────────────────────────────────────
async function initPiSDK(){
  try{
    await Pi.init({version:'2.0', sandbox:false});
    await triggerPiAuth(true);
  }catch(e){
    console.warn('Pi SDK:',e);
    setAuthStatus(T[lang].signinErr, true);
    document.getElementById('signin-btn').disabled=false;
  }
}

async function triggerPiAuth(silent=false){
  const btn=document.getElementById('signin-btn');
  if(btn) btn.disabled=true;
  setAuthStatus(T[lang].signinLoading);
  try{
    const auth=await Pi.authenticate(['username'], ()=>{});
    const res=await fetch('https://api.minepi.com/v2/me',{
      headers:{Authorization:`Bearer ${auth.accessToken}`}
    });
    if(!res.ok) throw new Error('API '+res.status);
    const me=await res.json();
    piUser={username: me.username||auth.user?.username||'Pioneer', accessToken:auth.accessToken};
    onAuthSuccess();
  }catch(e){
    console.error(e);
    setAuthStatus(T[lang].signinErr, true);
    if(btn) btn.disabled=false;
  }
}

function onAuthSuccess(){
  // Show chip
  const chip=document.getElementById('pi-chip');
  document.getElementById('pi-avatar').textContent=piUser.username[0].toUpperCase();
  document.getElementById('pi-name').textContent='@'+piUser.username;
  chip.classList.add('show');
  // Switch views
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('weather-ui').classList.add('show');
  showNotif(T[lang].welcome+' @'+piUser.username+' 🌤️');
  // Load weather
  loadByGeolocation();
}

function setAuthStatus(msg, isErr=false){
  const el=document.getElementById('auth-status');
  if(!el) return;
  el.textContent=msg;
  el.className='auth-status'+(isErr?' auth-err':'');
}

// ─── Geolocation ──────────────────────────────────────────────────────────────
function loadByGeolocation(){
  setContent(`<div class="loading"><div class="spinner"></div><div>${T[lang].loadingLoc}</div></div>`);
  if(!navigator.geolocation){loadCity('Cairo');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>loadWeatherByCoords(pos.coords.latitude, pos.coords.longitude),
    ()=>loadCity('Cairo'),
    {timeout:6000}
  );
}

// ─── Search ──────────────────────────────────────────────────────────────────
async function searchCity(){
  const val=document.getElementById('search-input').value.trim();
  if(!val) return;
  await loadCity(val);
}

// ─── Geocoding ───────────────────────────────────────────────────────────────
async function loadCity(name){
  setContent(`<div class="loading"><div class="spinner"></div><div>${T[lang].loadingCity}</div></div>`);
  try{
    const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`);
    const geo=await geoRes.json();
    if(!geo.results||!geo.results.length){
      setContent(`<div class="error-msg">${T[lang].notFound}</div>`);return;
    }
    const {latitude,longitude,name:cityName,country_code,timezone}=geo.results[0];
    await loadWeatherByCoords(latitude,longitude,cityName,country_code,timezone);
  }catch(e){
    setContent(`<div class="error-msg">Network error. Check connection.</div>`);
  }
}

async function loadWeatherByCoords(lat,lon,cityName,countryCode,tz){
  try{
    if(!cityName){
      // reverse geocode
      const rg=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=&latitude=${lat}&longitude=${lon}&count=1`).catch(()=>null);
      cityName='My Location'; countryCode=''; tz='auto';
    }
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m,visibility,uv_index,surface_pressure&hourly=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=${tz||'auto'}&forecast_days=7&wind_speed_unit=kmh`;
    const res=await fetch(url);
    const data=await res.json();
    data._city=cityName; data._country=countryCode||'';
    currentWeather=data;
    renderWeather(data);
  }catch(e){
    setContent(`<div class="error-msg">Failed to load weather. Try again.</div>`);
  }
}

// ─── Weather Codes ────────────────────────────────────────────────────────────
function wIcon(code){
  if(code===0)return'☀️';
  if(code<=2)return'⛅';
  if(code<=3)return'☁️';
  if(code<=49)return'🌫️';
  if(code<=69)return'🌧️';
  if(code<=79)return'🌨️';
  if(code<=82)return'⛈️';
  if(code<=99)return'🌩️';
  return'🌡️';
}
function wDesc(code){
  if(code===0)return'Clear sky';
  if(code<=2)return'Partly cloudy';
  if(code<=3)return'Overcast';
  if(code<=49)return'Foggy';
  if(code<=69)return'Rainy';
  if(code<=79)return'Snowy';
  if(code<=82)return'Heavy rain';
  if(code<=99)return'Thunderstorm';
  return'Unknown';
}
function wDescLang(code){
  const descs={
    en:['Clear sky','Partly cloudy','Overcast','Foggy','Rainy','Snowy','Heavy rain','Thunderstorm'],
    ar:['سماء صافية','غائم جزئياً','ملبّد بالغيوم','ضبابي','ممطر','ثلجي','أمطار غزيرة','عاصفة رعدية'],
    fr:['Ciel dégagé','Partiellement nuageux','Couvert','Brumeux','Pluvieux','Neigeux','Pluie forte','Orage'],
    es:['Cielo despejado','Parcialmente nublado','Nublado','Niebla','Lluvioso','Nevado','Lluvia fuerte','Tormenta'],
  };
  const t=descs[lang]||descs.en;
  if(code===0)return t[0];
  if(code<=2)return t[1];
  if(code<=3)return t[2];
  if(code<=49)return t[3];
  if(code<=69)return t[4];
  if(code<=79)return t[5];
  if(code<=82)return t[6];
  return t[7];
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderWeather(data){
  const t=T[lang];
  const c=data.current;
  const city=data._city||'—';
  const country=data._country||'';
  const temp=Math.round(c.temperature_2m);
  const feels=Math.round(c.apparent_temperature);
  const icon=wIcon(c.weathercode);
  const desc=wDescLang(c.weathercode);

  // Hourly (next 12h)
  const now=new Date();
  const hourlyHTML=data.hourly.time.slice(0,24).map((timeStr,i)=>{
    const d=new Date(timeStr);
    if(d<now) return '';
    const hh=d.getHours().toString().padStart(2,'0')+':00';
    return`<div class="hour-card"><div class="hour-time">${hh}</div><div class="hour-icon">${wIcon(data.hourly.weathercode[i])}</div><div class="hour-temp">${Math.round(data.hourly.temperature_2m[i])}°</div></div>`;
  }).filter(Boolean).slice(0,12).join('');

  // Daily
  const dailyHTML=data.daily.time.map((dateStr,i)=>{
    const d=new Date(dateStr);
    const dayName=t.days[d.getDay()];
    return`<div class="day-row"><div class="day-name">${dayName}</div><div class="day-icon">${wIcon(data.daily.weathercode[i])}</div><div class="day-temps"><span class="day-max">${Math.round(data.daily.temperature_2m_max[i])}°</span><span class="day-min">${Math.round(data.daily.temperature_2m_min[i])}°</span></div></div>`;
  }).join('');

  const vis=c.visibility!=null?(c.visibility/1000).toFixed(1)+' '+t.km:'—';

  setContent(`
    <div class="main-card">
      <div class="city-row">
        <div>
          <div class="city-name">${city}</div>
          <div class="country-code">${country}</div>
        </div>
        <div class="weather-icon-big">${icon}</div>
      </div>
      <div class="temp-row">
        <div class="temp-big">${temp}</div>
        <div class="temp-unit">°C</div>
      </div>
      <div class="feels-like">${t.feelsLike} ${feels}°C</div>
      <div class="weather-desc">${desc}</div>
      <div class="details-grid">
        <div class="detail-item"><div class="detail-icon">💧</div><div><div class="detail-label">${t.humidity}</div><div class="detail-val">${c.relativehumidity_2m}%</div></div></div>
        <div class="detail-item"><div class="detail-icon">💨</div><div><div class="detail-label">${t.wind}</div><div class="detail-val">${c.windspeed_10m} ${t.kmh}</div></div></div>
        <div class="detail-item"><div class="detail-icon">👁️</div><div><div class="detail-label">${t.visibility}</div><div class="detail-val">${vis}</div></div></div>
        <div class="detail-item"><div class="detail-icon">🌡️</div><div><div class="detail-label">${t.pressure}</div><div class="detail-val">${c.surface_pressure?.toFixed(0)||'—'} ${t.hPa}</div></div></div>
      </div>
    </div>

    <div class="section-title">${t.hourly}</div>
    <div class="hourly-scroll" style="margin-bottom:20px">${hourlyHTML}</div>

    <div class="section-title">${t.daily}</div>
    <div class="daily-list">${dailyHTML}</div>

    <button class="btn-report" onclick="sendReport()">${t.reportBtn}</button>
  `);
}

function setContent(html){
  document.getElementById('weather-content').innerHTML=html;
}

// ─── Community Report ─────────────────────────────────────────────────────────
function sendReport(){
  // In a real app this would send to backend; here we simulate the reward
  showNotif(T[lang].reportThanks);
}

// ─── Notification ─────────────────────────────────────────────────────────────
let notifTimer=null;
function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;
  el.classList.remove('hidden','hide');
  if(notifTimer) clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>{el.classList.add('hide');setTimeout(()=>el.classList.add('hidden'),300);},3500);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
if(typeof Pi!=='undefined'){
  initPiSDK();
}else{
  setAuthStatus('Open inside Pi Browser to sign in.', true);
  document.getElementById('signin-btn').disabled=false;
  // For testing outside Pi Browser — show weather directly
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('weather-ui').classList.add('show');
  loadByGeolocation();
}
</script>
</body>
